services:
  - type: web
    name: bike-service-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_URL
        value: https://bike-service-frontend.onrender.com
      - key: DB_HOST
        value: REPLACE_WITH_DB_HOST
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: REPLACE_WITH_DB_NAME
      - key: DB_USER
        value: REPLACE_WITH_DB_USER
      - key: DB_PASSWORD
        value: REPLACE_WITH_DB_PASSWORD
      - key: JWT_SECRET
        generateValue: true
      - key: PAYMENT_GATEWAY_PROVIDER
        value: MOCK
      - key: PAYMENT_CURRENCY
        value: INR
      - key: RAZORPAY_KEY_ID
        value: ""
      - key: RAZORPAY_KEY_SECRET
        value: ""
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_VERIFY_SERVICE_SID
        value: ""

staticSites:
  - name: bike-service-frontend
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://bike-service-backend.onrender.com/api
      - key: REACT_APP_PAYMENT_GATEWAY_PROVIDER
        value: MOCK
      - key: REACT_APP_RAZORPAY_KEY_ID
        value: ""
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
