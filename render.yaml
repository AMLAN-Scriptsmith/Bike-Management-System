services:
  - type: web
    name: bike-service-management
    env: node
    rootDir: .
    plan: free
    buildCommand: npm install && npm --prefix backend install && npm run build
    startCommand: npm --prefix backend start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_URL
        value: https://bike-service-management.onrender.com
      - key: REACT_APP_API_BASE_URL
        value: /api
      - key: DB_HOST
        value: gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_NAME
        value: test
      - key: DB_USER
        value: 3NuTc1jKNDwjp5E.root
      - key: DB_PASSWORD
        value: tr9FTds0V6zBsEj9
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: PAYMENT_GATEWAY_PROVIDER
        value: MOCK
      - key: PAYMENT_CURRENCY
        value: INR
      - key: RAZORPAY_KEY_ID
        value: ""
      - key: RAZORPAY_KEY_SECRET
        value: ""
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_VERIFY_SERVICE_SID
        value: ""
